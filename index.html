<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Web App with Local Storage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Telegram Web App Demo</h1>
        
        <!-- Форма для ввода данных -->
        <form id="dataForm">
            <label for="nameInput">Имя:</label>
            <input type="text" id="nameInput" placeholder="Введите ваше имя">
            
            <label for="phoneInput">Телефон:</label>
            <input type="tel" id="phoneInput" placeholder="Введите ваш телефон">
            
            <button type="submit">Сохранить данные</button>
        </form>

        <!-- Блок для отображения сохранённых данных -->
        <div id="savedData">
            <h2>Ваши данные:</h2>
            <p><strong>Имя:</strong> <span id="displayName"></span></p>
            <p><strong>Телефон:</strong> <span id="displayPhone"></span></p>
            <button id="clearBtn">Очистить данные</button>
        </div>
    </div>

    <!-- Подключение скриптов -->
    <script src="script.js"></script>
</body>
</html>
