<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Web App Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Telegram Web App Demo</h1>
        
        <!-- Форма для ввода данных -->
        <form id="dataForm">
            <label for="nameInput">Имя:</label>
            <input type="text" id="nameInput" placeholder="Введите ваше имя">
            
            <label for="phoneInput">Телефон:</label>
            <input type="tel" id="phoneInput" placeholder="Введите ваш телефон">
            
            <button type="submit">Сохранить данные</button>
        </form>

        <!-- Таблица для отображения данных -->
        <table id="dataTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Имя</th>
                    <th>Телефон</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody>
                <!-- Данные будут добавляться динамически -->
            </tbody>
        </table>

        <button id="clearAllBtn">Очистить все данные</button>
    </div>

    <!-- Подключение скриптов -->
    <script src="script.js"></script>
</body>
</html>
